stages:
  - build
  - deploy

build_frontend:
  stage: build
  image: node:22-alpine

  script:
    - cd localhub
    - npm ci
    - npm run build

  artifacts:
    paths:
      - localhub/dist/
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy_frontend:
  stage: deploy
  image: alpine:latest
  needs:
    - build_frontend

  script:
    - rm -rf /frontend/*
    - cp -r localhub/dist/. /frontend/
    - ls -al /frontend

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'