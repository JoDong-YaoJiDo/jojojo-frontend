stages:
  - build
  - deploy

default:
  image: node:22-alpine

variables:
  DEPLOY_DIR: /frontend

build_frontend:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

deploy_frontend:
  stage: deploy
  needs:
    - build_frontend
  script:
    - mkdir -p "$DEPLOY_DIR"
    - rm -rf "$DEPLOY_DIR"/*
    - cp -r dist/. "$DEPLOY_DIR"/
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'